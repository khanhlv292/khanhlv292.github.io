<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Glow & Health – Nhật Ký Đường Huyết ✨</title>

  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
  
  <style>
    @font-face {
      font-family: 'Aptos Display';
      src: local('Aptos Display'), local('Aptos'), local('Segoe UI');
    }
    :root {
      --blue-tech:   #0F85FF;
      --blue-pastel: #78C1FF;
      --blue-mint:   #BEEFF6;
      --teal-soft:   #C7F0E6;
      --charcoal:    #5A6B7A;
      --bg-cream:    #F5F8FF;
      --white:       #FFFFFF;
      --shadow-sm:   0 2px 12px rgba(15,133,255,0.08);
      --shadow-md:   0 6px 28px rgba(15,133,255,0.13);
      --radius:      16px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    body {
      font-family: 'Aptos Display', 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
      background: var(--bg-cream);
      color: var(--charcoal);
      min-height: 100vh;
      overflow-x: hidden; /* Prevent horizontal scroll on body */
    }
    .card {
      background: var(--white);
      border-radius: var(--radius);
      box-shadow: var(--shadow-sm);
      padding: 16px; /* Reduced mobile padding */
      transition: box-shadow 0.2s;
    }
    @media (min-width: 640px) { .card { padding: 22px; } }
    .card:hover { box-shadow: var(--shadow-md); }
    
    /* Optimized KPI Values for mobile */
    .kpi-value { font-size: 1.75rem; font-weight: 800; color: var(--blue-tech); line-height: 1.1; margin: 4px 0 2px; }
    @media (min-width: 640px) { .kpi-value { font-size: 2.25rem; } }

    /* Chart Container Mobile Opitmization */
    .chart-container { position: relative; height: 300px; } /* taller on mobile */
    @media (min-width: 768px) { .chart-container { height: 270px; } }

    /* CRITICAL MOBILE TABLE FIX */
    .table-scroll-container {
      width: 100%;
      overflow-x: auto; /* Enable horizontal scroll */
      -webkit-overflow-scrolling: touch;
      border-radius: 8px;
      margin-top: 10px;
    }
    .history-table {
      width: 100%;
      min-width: 600px; /* Force minimum width to prevent squishing on mobile */
      border-collapse: collapse;
      font-size: 0.83rem;
    }
    .history-table td { padding: 12px 10px; vertical-align: top; }

    /* Rest of style is unchanged */
    .history-table thead th {
      background: linear-gradient(135deg, #EEF6FF, #E6F8FC);
      color: var(--blue-tech); font-weight: 700; font-size: 0.73rem;
      text-transform: uppercase; padding: 12px 10px; text-align: left; border-bottom: 2px solid #D8EFFE;
    }
    .history-table tbody tr { border-bottom: 1px solid #EDF3F8; transition: background 0.15s; }
    .history-table tbody tr:hover { background: #F4FAFF; }
    
    .glucose-badge { display: inline-block; padding: 3px 12px; border-radius: 999px; font-size: 0.75rem; font-weight: 600; white-space: nowrap; }
    .badge-normal  { background: #E8FBF4; color: #1DA462; }
    .badge-warn    { background: #FFF4E0; color: #E5920A; }
    .badge-danger  { background: #FFE9EA; color: #E54C4C; }
    .badge-low     { background: #EDE9FF; color: #6C4DEF; }
    
    .latest-value { font-size: 2.75rem; font-weight: 800; background: linear-gradient(135deg, var(--blue-tech), #38b6ff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    @media (min-width: 640px) { .latest-value { font-size: 3.5rem; } }
    .latest-note-box { background: linear-gradient(135deg, #F0F9FF, #E8FEF7); border-left: 3px solid var(--blue-pastel); padding: 10px 14px; margin-top: 12px; font-size: 0.82rem; }
  </style>
</head>
<body>

<div class="bg-[#0F85FF] p-4 sm:p-6 md:p-8">
  <div style="max-width:1200px;margin:0 auto;" class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4">
    <div>
      <div class="text-white text-xl sm:text-2xl md:text-3xl font-extrabold tracking-tight">Glow &amp; Health: Nhật Ký Đường Huyết ✨</div>
